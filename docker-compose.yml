---
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventorymgr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-inventorymgr}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventorymgr}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-inventorymgr}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-inventorymgr}
      JWT_SECRET: ${JWT_SECRET:-replace-with-32-byte-random-secret}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    develop:
      watch:
        - action: rebuild
          path: backend/Dockerfile
        - action: sync
          path: backend/app
          target: /app/app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        INVENTORYMGR_API_URL: http://backend:8000
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "3000:3000"
    environment:
      INVENTORYMGR_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    develop:
      watch:
        - action: rebuild
          path: frontend/Dockerfile
        - action: sync
          path: frontend/src
          target: /app/src
  seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
    profiles: ["seed"]
    user: "1000:1000"
    command: [".venv/bin/python", "seed_sample.py"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-inventorymgr}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-inventorymgr}
      JWT_SECRET: ${JWT_SECRET:-replace-with-32-byte-random-secret}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata: