services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inventorymgr
      POSTGRES_DB: inventorymgr_test
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventorymgr -d inventorymgr_test"]
      interval: 3s
      timeout: 5s
      retries: 20