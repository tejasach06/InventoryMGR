<!DOCTYPE html>
<html>
<head>
  <title>GAN Iteration 2 Evaluation</title>
  <style>
    body { font-family: monospace; white-space: pre; }
    .section { margin: 20px 0; border: 1px solid #ccc; padding: 10px; }
    .pass { color: green; }
    .fail { color: red; }
    .neutral { color: blue; }
  </style>
</head>
<body>

<div class="section">
EVALUATION CHECKLIST - GAN Iteration 2
=====================================

</div>

<script>
async function evaluateApp() {
  try {
    // Fetch the inventory page
    const response = await fetch('http://localhost:3000/inventory');
    const html = await response.text();
    
    // Parse for specific elements
    const hasAnimatePillPop = html.includes('animate-pill-pop');
    const hasAnimateRowEnter = html.includes('animate-row-enter');
    const hasBadges = html.includes('Badge') || html.includes('badge');
    const hasFilterBar = html.includes('FilterBar') || html.includes('filter');
    
    console.log('✓ Page fetched successfully');
    console.log('- animate-pill-pop present:', hasAnimatePillPop);
    console.log('- animate-row-enter present:', hasAnimateRowEnter);
    console.log('- Badge component present:', hasBadges);
    console.log('- FilterBar component present:', hasFilterBar);
    
  } catch (e) {
    console.error('Error:', e);
  }
}

// Try to evaluate
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', evaluateApp);
} else {
  evaluateApp();
}
</script>

</body>
</html>
